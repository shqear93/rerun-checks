name: E2E (rerun-all-failed wildcard)

on:
  workflow_run:
    workflows: ["E2E Target (flaky check)"]
    types: [completed]

jobs:
  rerun:
    name: Rerun every failed check via check-names '*'
    # Only same-repo runs: workflow_run executes with base-repo secrets, so
    # never check out / act on a fork's head ref here.
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: write
      checks: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm & install
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: true

      - name: Build the action
        run: pnpm run build

      - name: Rerun all failed checks
        id: rerun
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          check-names: '*'
          target-branch: ${{ github.event.workflow_run.head_branch }}

      - name: Verify wildcard mode only touched failed checks, including matrix duplicates
        run: |
          echo "result: ${{ steps.rerun.outputs.result }}"

          echo '${{ steps.rerun.outputs.result }}' | jq -e '
            (.rerunChecks | map(select(. == "always-pass-check")) | length == 0) and
            (.rerunChecks | map(select(. == "matrix-check")) | length == 2)
          ' || {
            echo "::error::wildcard rerun did not match the expected set - always-pass-check must be excluded, matrix-check must appear twice (once per duplicate-named job)."
            exit 1
          }
