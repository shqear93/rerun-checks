name: CI

on: pull_request

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm & install
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: true

      - name: Run unit tests
        run: pnpm test

      - name: Build (sanity check)
        run: pnpm run build
