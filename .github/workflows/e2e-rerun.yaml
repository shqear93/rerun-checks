name: E2E (rerun scenarios)

on:
  workflow_run:
    workflows: ["E2E Target (flaky check)"]
    types: [completed]

# These jobs run sequentially (via `needs`), not in parallel, even though
# they all react to the same event. Running them concurrently previously
# caused two independent jobs to both try rerunning flaky-check at once -
# GitHub's rerun-job attempt counter is scoped to the whole workflow run,
# not per-job, so racing reruns of overlapping checks compounded into a
# retrigger storm (one run reached attempt 16 before settling). Sequencing
# guarantees each job sees a settled state left by the one before it.
jobs:
  rerun-single-check:
    name: Rerun flaky-check via this action
    # Only same-repo runs: workflow_run executes with base-repo secrets, so
    # never check out / act on a fork's head ref here.
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: write
      checks: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm & install
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: true

      - name: Build the action
        run: pnpm run build

      - name: Rerun flaky-check
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          check-names: flaky-check
          target-branch: ${{ github.event.workflow_run.head_branch }}

  rerun-wildcard:
    name: Rerun every failed check via check-names '*'
    needs: rerun-single-check
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: write
      checks: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm & install
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: true

      - name: Build the action
        run: pnpm run build

      - name: Rerun all failed checks
        id: rerun
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          check-names: '*'
          target-branch: ${{ github.event.workflow_run.head_branch }}

      - name: Verify wildcard mode only touched failed checks, including matrix duplicates
        run: |
          echo "result: ${{ steps.rerun.outputs.result }}"

          echo '${{ steps.rerun.outputs.result }}' | jq -e '
            (.rerunChecks | map(select(. == "always-pass-check")) | length == 0) and
            (.rerunChecks | map(select(. == "matrix-check")) | length == 2)
          ' || {
            echo "::error::wildcard rerun did not match the expected set - always-pass-check must be excluded, matrix-check must appear twice (once per duplicate-named job)."
            exit 1
          }

  rerun-not-found:
    name: Attempt to rerun a check name that doesn't exist
    needs: rerun-wildcard
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: write
      checks: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm & install
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: true

      - name: Build the action
        run: pnpm run build

      - name: Rerun a nonexistent check
        id: rerun
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          check-names: this-check-does-not-exist
          target-branch: ${{ github.event.workflow_run.head_branch }}

      - name: Verify it was reported as not-found, not as a failure
        run: |
          echo "result: ${{ steps.rerun.outputs.result }}"

          echo '${{ steps.rerun.outputs.result }}' | jq -e '
            .notFoundChecks == ["this-check-does-not-exist"] and
            .rerunChecks == [] and
            .alreadyRunningChecks == []
          ' || {
            echo "::error::expected notFoundChecks to contain exactly the nonexistent name, with nothing rerun."
            exit 1
          }
