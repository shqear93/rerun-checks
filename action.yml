name: 'Rerun Checks'

branding:
  icon: 'refresh-cw'
  color: 'purple'
description: 'Rerun specified GitHub checks'

inputs:
  check-names:
    description: |
      Comma-separated list of check names to rerun.
      Pass '*' to rerun every check with a 'failure' conclusion instead
      of naming each one.
    required: true
  github-token:
    description: 'GitHub token'
    required: true
  target-branch:
    description: |
      Branch for which checks should be rerun.
      If not provided, the branch of the pull request that triggered
      the workflow is used
    required: false
  page-size:
    description: 'GitHub API per_page option'
    required: false

outputs:
  rerun-checks:
    description: 'Comma-separated list of check names that were successfully rerun'
  not-found-checks:
    description: 'Comma-separated list of check names that were not found'
  already-running-checks:
    description: 'Comma-separated list of check names that were already running'

runs:
  using: 'node20'
  main: 'dist/index.js'
